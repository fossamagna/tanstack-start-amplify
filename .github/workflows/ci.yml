name: CI

on:
  push:
    branches: [main, init]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: 22
          cache: true

      - name: Build amplify-adapter-tanstack-start
        run: vp run --filter amplify-adapter-tanstack-start build

      - name: Check
        run: vp check

      - name: Test
        run: vp run --filter './packages/**' test

      - name: Build
        run: vp run -r build
