name: CI

on:
  push:
    branches: [main, init]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check
        run: pnpm exec vp check

      - name: Test
        run: pnpm exec vp run --filter amplify-adapter-tanstack-start test

      - name: Build
        run: pnpm exec vp run --filter amplify-adapter-tanstack-start build
