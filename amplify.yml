version: 1
applications:
  - backend:
      phases:
        preBuild:
          commands:
            - nvm install 22
            - nvm use 22
            - node -v
            - curl -fsSL https://viteplus.dev/install.sh | bash
            - export PATH="$HOME/.vite-plus/bin:$PATH"
        build:
          commands:
            - corepack enable
            - pnpm -v
            - pnpm install --frozen-lockfile
            - pnpm rebuild esbuild
            - pnpm exec ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
    frontend:
      phases:
        preBuild:
          commands:
            - vp install
        build:
          commands:
            - free -h
            - (while true; do echo "=== $(date -u +%H:%M:%S) ===" && free -h | grep Mem; sleep 10; done) & echo $! > /tmp/mem_monitor.pid
            - NODE_OPTIONS="--max-old-space-size=32768" vp run --filter amplify-adapter-tanstack-start --filter todo-app build
            - kill $(cat /tmp/mem_monitor.pid) 2>/dev/null || true
            - free -h
      artifacts:
        baseDirectory: .amplify-hosting
        files:
          - "**/*"
      # cache disabled for cold build test
      # cache:
      #   paths:
      #     - node_modules/**/*
      buildPath: examples/todo-app
    appRoot: examples/todo-app
