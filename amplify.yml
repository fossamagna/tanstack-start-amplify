version: 1
applications:
  - backend:
      phases:
        preBuild:
          commands:
            - nvm install 22
            - nvm use 22
            - node -v
            - curl -fsSL https://viteplus.dev/install.sh | bash
            - export PATH="$HOME/.vite-plus/bin:$PATH"
        build:
          commands:
            - corepack enable
            - pnpm -v
            - pnpm install --frozen-lockfile
            - pnpm rebuild esbuild
            - pnpm exec ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
    frontend:
      phases:
        preBuild:
          commands:
            - vp install
            - dnf install -y time
        build:
          commands:
            - free -h
            - /usr/bin/time -v sh -c 'NODE_OPTIONS="--max-old-space-size=32768" vp run --filter amplify-adapter-tanstack-start --filter todo-app build' 2>&1
            - free -h
      artifacts:
        baseDirectory: .amplify-hosting
        files:
          - "**/*"
      buildPath: examples/todo-app
    appRoot: examples/todo-app
